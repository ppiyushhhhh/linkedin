name: Deploy LinkUp World to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Docker App on Azure Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "========== START DEPLOYMENT =========="

            cd /home/azureuser/linkedin

            echo "Current directory:"
            pwd

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Checking important files..."
            ls -la
            ls -la .env || echo ".env not visible or missing"
            ls -la Dockerfile docker-compose.yml server-adapter.mjs

            echo "Stopping old PM2/Vite process if running..."
            pm2 delete linkedin || true
            pm2 save || true

            echo "Freeing port 3000..."
            sudo fuser -k 3000/tcp || true

            echo "Docker version:"
            sudo docker --version
            sudo docker compose version

            echo "Stopping old Docker Compose stack..."
            sudo docker compose down --remove-orphans || true

            echo "Building Docker image..."
            sudo docker compose build --no-cache

            echo "Starting Docker container..."
            sudo docker compose up -d

            echo "Waiting for app to start..."
            sleep 20

            echo "Docker Compose status:"
            sudo docker compose ps

            echo "Docker container list:"
            sudo docker ps -a

            echo "Docker logs:"
            sudo docker compose logs --tail=150

            echo "Testing local app..."
            curl -I http://localhost:3000/login

            echo "Testing Nginx config..."
            sudo nginx -t

            echo "Restarting Nginx..."
            sudo systemctl restart nginx

            echo "Testing public app..."
            curl -I http://20.244.48.171/login

            echo "========== DEPLOYMENT SUCCESSFUL =========="
